name: Publish to AUR

on:
  release:
    types: [published]

jobs:
  aur-publish:
    name: Push updated PKGBUILD to AUR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download release tarball and compute sha256
        id: sha
        run: |
          VERSION=${{ steps.version.outputs.version }}
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz"
          curl -sL "$URL" -o source.tar.gz
          SHA=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD version and sha256
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=${{ steps.sha.outputs.sha256 }}
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" aur/PKGBUILD
          sed -i "s/sha256sums=('SKIP')/sha256sums=('${SHA}')/" aur/PKGBUILD

      - name: Regenerate .SRCINFO
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/aur:/aur" \
            archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm pacman-contrib sudo &&
              useradd -m builder &&
              cp -r /aur /tmp/aur &&
              chown -R builder:builder /tmp/aur &&
              sudo -u builder bash -c 'cd /tmp/aur && makepkg --printsrcinfo' > /aur/.SRCINFO
            "

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: uni-update
          pkgbuild: ./aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ steps.version.outputs.version }}"
          force_push: true