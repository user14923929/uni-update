name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  # ── Build & test matrix ───────────────────────────────────────
  build:
    name: Build on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-24.04
            image: ubuntu:24.04
            install: apt-get update -qq && apt-get install -y cmake g++

          - distro: ubuntu-22.04
            image: ubuntu:22.04
            install: apt-get update -qq && apt-get install -y cmake g++

          - distro: fedora-40
            image: fedora:40
            install: dnf install -y cmake gcc-c++

          - distro: alpine-3.20
            image: alpine:3.20
            install: apk add --no-cache cmake g++ make

          - distro: archlinux
            image: archlinux:latest
            install: pacman -Syu --noconfirm cmake gcc

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install build deps
        run: ${{ matrix.install }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Smoke test - help
        run: ./build/uni-update --help

      - name: Smoke test - version
        run: ./build/uni-update --version

      - name: Smoke test - dry-run
        run: ./build/uni-update --dry-run --all

      # Сохраняем бинарь только с archlinux для release
      - name: Upload artifact
        if: matrix.distro == 'archlinux'
        uses: actions/upload-artifact@v4
        with:
          name: uni-update-${{ matrix.distro }}
          path: build/uni-update

  # ── Release: собрать бинари и приложить к GitHub Release ──────
  release:
    name: Release binaries
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    strategy:
      matrix:
        include:
          - image: ubuntu:24.04
            install: apt-get update -qq && apt-get install -y cmake g++
            suffix: linux-x86_64

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install build deps
        run: ${{ matrix.install }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binary
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          strip build/uni-update

      - name: Package tarball
        run: |
          VERSION=${{ github.event.release.tag_name }}
          tar czf uni-update-${VERSION}-${{ matrix.suffix }}.tar.gz \
            -C build uni-update

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: uni-update-*.tar.gz

  # ── Lint: проверяем что код хотя бы компилируется с -Wall ─────
  lint:
    name: Compiler warnings check
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - run: apt-get update -qq && apt-get install -y cmake g++
      - uses: actions/checkout@v4
      - name: Build with -Wall -Wextra
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-Wall -Wextra -Werror"
          cmake --build build --parallel
